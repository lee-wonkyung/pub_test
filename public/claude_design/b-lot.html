<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>b-lot · 로그인 / 회원가입</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --purple:#5D00FF;
    --purple-deep:#5700ED;
    --ink:#000000;
    --line:rgba(0,0,0,0.2);
    --kakao:#FEE500;
    --naver:#03C75A;
    --field-radius:6px;
    --font:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:var(--font);
    background:#e9e9ee;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px;
    -webkit-font-smoothing:antialiased;
  }

  /* Phone frame */
  .device{
    width:393px;
    height:852px;
    background:#fff;
    border-radius:44px;
    box-shadow:0 2px 8px rgba(0,0,0,.12),0 24px 60px rgba(0,0,0,.22);
    padding:0;
    position:relative;
    overflow:hidden;
    border:1px solid rgba(0,0,0,.06);
  }
  .viewport{
    position:absolute;
    inset:0;
    overflow:hidden;
  }

  /* Screen system */
  .screen{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    background:#fff;
    transition:transform .36s cubic-bezier(.4,0,.2,1),opacity .3s ease;
  }
  .screen[hidden]{display:none;}
  .screen.is-out{transform:translateX(-14%);opacity:0;pointer-events:none;}
  .screen.is-in-right{transform:translateX(100%);}

  /* Status bar */
  .statusbar{
    height:50px;
    flex:0 0 50px;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    padding:0 28px 8px;
    font-weight:600;
  }
  .statusbar .time{font-size:16px;letter-spacing:.2px;}
  .statusbar .indicators{display:flex;align-items:center;gap:7px;}

  /* Header */
  .topbar{
    height:54px;
    flex:0 0 54px;
    display:flex;
    align-items:center;
    padding:0 20px;
  }
  .topbar .icon-btn{
    width:24px;height:24px;display:flex;align-items:center;justify-content:center;
    background:none;border:none;cursor:pointer;color:#191D1C;
  }
  .topbar.center{justify-content:space-between;}
  .topbar .left-group{display:flex;align-items:center;gap:14px;}
  .topbar .title{
    position:absolute;left:0;right:0;text-align:center;
    font-size:18px;font-weight:700;pointer-events:none;letter-spacing:-.01em;
  }

  /* ===== LOGIN ===== */
  .login-body{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:0 32px 40px;
    min-height:0;
  }
  .brand{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:34px;
    margin-top:30px;
  }
  .brand .mark{width:88px;height:77px;display:block;}
  .brand .tagline{width:249px;height:auto;display:block;}

  .login-form{
    display:flex;
    flex-direction:column;
    gap:16px;
    margin-top:48px;
  }
  .uline-field{
    height:48px;
    border:1px solid var(--line);
    display:flex;
    align-items:center;
    padding:0 14px;
  }
  .uline-field input{
    border:none;outline:none;width:100%;height:100%;
    font-family:var(--font);font-size:16px;letter-spacing:-.01em;color:#000;background:transparent;
  }
  .uline-field input::placeholder{color:rgba(0,0,0,.4);}

  .login-actions{
    display:flex;flex-direction:column;gap:12px;margin-top:24px;
  }
  .btn{
    height:54px;border-radius:8px;border:none;cursor:pointer;
    font-family:var(--font);font-weight:700;font-size:18px;letter-spacing:-.01em;
    display:flex;align-items:center;justify-content:center;transition:filter .15s ease,background .15s ease;
  }
  .btn:active{filter:brightness(.93);}
  .btn-primary{background:var(--purple);color:#fff;}
  .btn-outline{background:#fff;color:var(--purple);box-shadow:inset 0 0 0 1px var(--purple);}

  .login-spacer{flex:1;min-height:24px;}

  .find-row{
    display:flex;align-items:center;justify-content:center;gap:16px;
    color:rgba(0,0,0,.8);font-size:13px;letter-spacing:-1px;
  }
  .find-row .sep{width:1px;height:10px;background:rgba(0,0,0,.2);}
  .find-row a{color:inherit;text-decoration:none;cursor:pointer;}

  .sns-divider{
    display:flex;align-items:center;gap:16px;margin-top:40px;
    color:rgba(0,0,0,.4);font-size:14px;font-weight:500;
  }
  .sns-divider::before,.sns-divider::after{
    content:"";flex:1;height:1px;background:rgba(0,0,0,.16);
  }
  .sns-row{
    display:flex;align-items:center;justify-content:center;gap:20px;margin-top:40px;
  }
  .sns-btn{
    width:48px;height:48px;border-radius:99px;border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:filter .15s ease;
  }
  .sns-btn:active{filter:brightness(.92);}
  .sns-btn.kakao{background:var(--kakao);}
  .sns-btn.google{background:#fff;box-shadow:inset 0 0 0 1px #e8e8e8;}
  .sns-btn.apple{background:#000;}
  .sns-btn.naver{background:var(--naver);}
  .sns-btn img,.sns-btn svg{width:24px;height:24px;display:block;}

  /* ===== SIGNUP ===== */
  .signup-scroll{
    flex:1;
    overflow-y:auto;
    overflow-x:hidden;
    padding:24px 16px 32px;
    display:flex;
    flex-direction:column;
    gap:24px;
    -webkit-overflow-scrolling:touch;
  }
  .signup-scroll::-webkit-scrollbar{width:0;}

  .field-group{display:flex;flex-direction:column;gap:8px;}
  .field-label{
    font-size:14px;font-weight:700;letter-spacing:-.01em;color:rgba(0,0,0,.82);
  }
  .field-label .req{color:#000;}

  .input-box{
    height:44px;border-radius:var(--field-radius);background:#fff;
    box-shadow:inset 0 0 0 1px var(--line);
    display:flex;align-items:center;padding:0 12px;gap:8px;
  }
  .input-box input{
    flex:1;border:none;outline:none;background:transparent;height:100%;
    font-family:var(--font);font-size:14px;font-weight:500;letter-spacing:-.01em;color:#000;min-width:0;
  }
  .input-box input::placeholder{color:rgba(0,0,0,.28);}
  .input-box .eye{
    width:20px;height:20px;display:flex;align-items:center;justify-content:center;
    background:none;border:none;cursor:pointer;color:rgba(0,0,0,.55);flex:0 0 auto;
  }

  .row{display:flex;gap:8px;align-items:stretch;}
  .row .input-box{flex:1;}

  .pill-btn{
    flex:0 0 80px;height:48px;border-radius:var(--field-radius);
    background:#191D1C;color:#fff;border:none;cursor:pointer;
    font-family:var(--font);font-weight:700;font-size:14px;letter-spacing:-.01em;
    display:flex;align-items:center;justify-content:center;transition:filter .15s ease;
  }
  .pill-btn:active{filter:brightness(1.4);}
  .row.tall .input-box{height:48px;}

  .selectbox{
    flex:1;height:46px;border-radius:var(--field-radius);
    box-shadow:inset 0 0 0 1px var(--line);background:#fff;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 14px;cursor:pointer;
  }
  .selectbox span{font-size:14px;font-weight:500;color:rgba(0,0,0,.45);}
  .selectbox.filled span{color:#000;}
  .selectbox svg{width:16px;height:16px;color:rgba(0,0,0,.5);}

  .addr-stack{display:flex;flex-direction:column;gap:6px;}
  .addr-stack .row .input-box{flex:0 0 88px;}
  .addr-find{
    flex:0 0 96px;height:42px;border-radius:var(--field-radius);
    background:#191D1C;color:#fff;border:none;cursor:pointer;
    font-family:var(--font);font-weight:700;font-size:14px;
    display:flex;align-items:center;justify-content:center;align-self:center;transition:filter .15s ease;
  }
  .addr-find:active{filter:brightness(1.4);}

  .gender-row{display:flex;align-items:center;gap:16px;padding-top:5px;}
  .radio-opt{display:flex;align-items:center;gap:8px;cursor:pointer;}
  .radio-opt .dot{
    width:20px;height:20px;border-radius:99px;
    box-shadow:inset 0 0 0 1.6px rgba(0,0,0,.3);
    display:flex;align-items:center;justify-content:center;transition:box-shadow .15s ease;
  }
  .radio-opt .dot::after{
    content:"";width:10px;height:10px;border-radius:99px;background:var(--purple);
    transform:scale(0);transition:transform .15s ease;
  }
  .radio-opt.on .dot{box-shadow:inset 0 0 0 1.6px var(--purple);}
  .radio-opt.on .dot::after{transform:scale(1);}
  .radio-opt span{font-size:14px;font-weight:500;color:#000;}

  .submit-btn{
    height:52px;border-radius:8px;border:none;cursor:pointer;margin-top:6px;
    background:var(--purple-deep);color:#fff;
    font-family:var(--font);font-weight:700;font-size:18px;letter-spacing:-.01em;
    display:flex;align-items:center;justify-content:center;transition:filter .15s ease;
  }
  .submit-btn:active{filter:brightness(.93);}

  .toast{
    position:absolute;left:50%;bottom:40px;transform:translateX(-50%) translateY(12px);
    background:rgba(25,29,28,.94);color:#fff;font-size:13px;font-weight:500;
    padding:11px 18px;border-radius:99px;opacity:0;pointer-events:none;
    transition:opacity .25s ease,transform .25s ease;white-space:nowrap;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
  <div class="device" data-screen-label="b-lot app">
    <div class="viewport">

      <!-- ============ LOGIN ============ -->
      <section class="screen" id="screen-login" data-screen-label="로그인">
        <div class="statusbar">
          <span class="time">9:41</span>
          <span class="indicators">
            <svg width="18" height="12" viewBox="0 0 18 12" fill="#000"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
            <svg width="17" height="12" viewBox="0 0 17 12" fill="#000"><path d="M8.5 2.2c2.3 0 4.4.9 6 2.4l1.4-1.5C13.9 1.2 11.3.1 8.5.1S3.1 1.2 1.1 3.1l1.4 1.5c1.6-1.5 3.7-2.4 6-2.4zM8.5 6c1.2 0 2.3.5 3.1 1.3l1.4-1.5C11.8 4.6 10.2 4 8.5 4S5.2 4.6 4 5.8l1.4 1.5C6.2 6.5 7.3 6 8.5 6zm0 3.6l2.1-2.2c-.5-.6-1.3-1-2.1-1s-1.6.4-2.1 1l2.1 2.2z"/></svg>
            <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#000" opacity=".4"/><rect x="2" y="2" width="18" height="8" rx="1.6" fill="#000"/><rect x="23" y="4" width="2" height="4" rx="1" fill="#000" opacity=".5"/></svg>
          </span>
        </div>

        <div class="topbar" style="justify-content:flex-end;">
          <button class="icon-btn" id="login-close" aria-label="닫기">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
        </div>

        <div class="login-body">
          <div class="brand">
            <img class="mark" src="assets/logo.svg" alt="b-lot 로고">
            <img class="tagline" src="assets/tagline.svg" alt="인생의 맛을 아는 진짜 으른들의 놀이터">
          </div>

          <div class="login-form">
            <div class="uline-field">
              <input type="text" placeholder="아이디를 입력하세요" autocomplete="username">
            </div>
            <div class="uline-field">
              <input type="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
            </div>
          </div>

          <div class="login-actions">
            <button class="btn btn-primary" id="login-submit">로그인</button>
            <button class="btn btn-outline" id="go-signup">회원가입</button>
          </div>

          <div class="login-spacer"></div>

          <div class="find-row">
            <a>아이디 찾기</a>
            <span class="sep"></span>
            <a>비밀번호 찾기</a>
          </div>

          <div class="sns-divider"><span>SNS 계정으로 로그인</span></div>

          <div class="sns-row">
            <button class="sns-btn kakao" aria-label="카카오 로그인">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="#000"><path d="M12 3.2C6.9 3.2 2.8 6.4 2.8 10.3c0 2.5 1.7 4.7 4.2 6l-1 3.7c-.1.3.3.6.6.4l4.4-2.9c.3 0 .7.1 1 .1 5.1 0 9.2-3.2 9.2-7.1S17.1 3.2 12 3.2z"/></svg>
            </button>
            <button class="sns-btn google" aria-label="구글 로그인">
              <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#4285F4" d="M22 12.2c0-.7-.1-1.4-.2-2H12v3.8h5.6c-.2 1.3-1 2.4-2 3.1v2.6h3.3c1.9-1.8 3-4.4 3-7.5z"/><path fill="#34A853" d="M12 22.5c2.7 0 5-1 6.6-2.6l-3.3-2.6c-.9.6-2 1-3.3 1-2.6 0-4.7-1.7-5.5-4.1H3.2v2.6C4.8 20 8.1 22.5 12 22.5z"/><path fill="#FBBC05" d="M6.5 14.2c-.2-.6-.3-1.3-.3-2s.1-1.4.3-2V7.6H3.2C2.4 9 2 10.5 2 12.2s.4 3.2 1.2 4.6l3.3-2.6z"/><path fill="#EA4335" d="M12 6c1.5 0 2.8.5 3.8 1.5l2.9-2.9C16.9 2.9 14.7 2 12 2 8.1 2 4.8 4.4 3.2 7.6l3.3 2.6C7.3 7.8 9.4 6 12 6z"/></svg>
            </button>
            <button class="sns-btn apple" aria-label="애플 로그인">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M16.4 12.6c0-2.2 1.8-3.3 1.9-3.3-1-1.5-2.6-1.7-3.2-1.7-1.4-.1-2.7.8-3.3.8s-1.7-.8-2.8-.8c-1.5 0-2.8.8-3.5 2.1-1.5 2.6-.4 6.4 1.1 8.5.7 1 1.5 2.2 2.6 2.2 1 0 1.4-.7 2.7-.7s1.6.7 2.7.6c1.1 0 1.8-1 2.5-2 .8-1.2 1.1-2.3 1.1-2.4-.1 0-2.1-.8-2.1-3.1zM14.3 6.2c.6-.7 1-1.7.9-2.7-.8 0-1.9.6-2.5 1.3-.5.6-1 1.6-.9 2.5.9.1 1.8-.5 2.5-1.1z"/></svg>
            </button>
            <button class="sns-btn naver" aria-label="네이버 로그인">
              <svg width="24" height="24" viewBox="0 0 16 16" fill="#fff"><path d="M10.933 0v8.564L5.099 0H0v16h5.067V7.436L10.901 16H16V0h-5.067z"/></svg>
            </button>
          </div>
        </div>
      </section>

      <!-- ============ SIGNUP ============ -->
      <section class="screen is-in-right" id="screen-signup" data-screen-label="회원가입" hidden>
        <div class="statusbar">
          <span class="time">9:41</span>
          <span class="indicators">
            <svg width="18" height="12" viewBox="0 0 18 12" fill="#000"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
            <svg width="17" height="12" viewBox="0 0 17 12" fill="#000"><path d="M8.5 2.2c2.3 0 4.4.9 6 2.4l1.4-1.5C13.9 1.2 11.3.1 8.5.1S3.1 1.2 1.1 3.1l1.4 1.5c1.6-1.5 3.7-2.4 6-2.4zM8.5 6c1.2 0 2.3.5 3.1 1.3l1.4-1.5C11.8 4.6 10.2 4 8.5 4S5.2 4.6 4 5.8l1.4 1.5C6.2 6.5 7.3 6 8.5 6zm0 3.6l2.1-2.2c-.5-.6-1.3-1-2.1-1s-1.6.4-2.1 1l2.1 2.2z"/></svg>
            <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#000" opacity=".4"/><rect x="2" y="2" width="18" height="8" rx="1.6" fill="#000"/><rect x="23" y="4" width="2" height="4" rx="1" fill="#000" opacity=".5"/></svg>
          </span>
        </div>

        <div class="topbar center">
          <div class="left-group">
            <button class="icon-btn" id="signup-back" aria-label="뒤로">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
            </button>
            <button class="icon-btn" id="signup-home" aria-label="홈">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11l8-6.5 8 6.5"/><path d="M6 10v9h12v-9"/></svg>
            </button>
          </div>
          <div class="title">가입</div>
          <button class="icon-btn" aria-label="검색">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
          </button>
        </div>

        <div class="signup-scroll">
          <!-- 아이디 -->
          <div class="field-group">
            <label class="field-label">아이디 <span class="req">*</span></label>
            <div class="row tall">
              <div class="input-box"><input type="text" placeholder="Place holder"></div>
              <button class="pill-btn dup">중복확인</button>
            </div>
          </div>

          <!-- 비밀번호 -->
          <div class="field-group">
            <label class="field-label">비밀번호 <span class="req">*</span></label>
            <div class="input-box">
              <input type="password" placeholder="영문+숫자+특수문자 포함 8자 이상">
              <button class="eye" data-eye aria-label="비밀번호 표시">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="2.6"/></svg>
              </button>
            </div>
          </div>

          <!-- 비밀번호 확인 -->
          <div class="field-group">
            <label class="field-label">비밀번호 확인 <span class="req">*</span></label>
            <div class="input-box">
              <input type="password" placeholder="영문+숫자+특수문자 포함 8자 이상">
              <button class="eye" data-eye aria-label="비밀번호 표시">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="2.6"/></svg>
              </button>
            </div>
          </div>

          <!-- 닉네임 -->
          <div class="field-group">
            <label class="field-label">닉네임 <span class="req">*</span></label>
            <div class="row tall">
              <div class="input-box"><input type="text" placeholder="공백없이 2~10자 입력"></div>
              <button class="pill-btn dup">중복확인</button>
            </div>
          </div>

          <!-- 이름 -->
          <div class="field-group">
            <label class="field-label">이름 <span class="req">*</span></label>
            <div class="input-box"><input type="text" placeholder="김봄봄"></div>
          </div>

          <!-- 이메일 -->
          <div class="field-group">
            <label class="field-label">이메일 <span class="req">*</span></label>
            <div class="input-box"><input type="email" placeholder="김봄봄"></div>
          </div>

          <!-- 생년월일 -->
          <div class="field-group">
            <label class="field-label">생년월일 <span class="req">*</span></label>
            <div class="row">
              <div class="selectbox"><span>년</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></div>
              <div class="selectbox"><span>월</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></div>
              <div class="selectbox"><span>일</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></div>
            </div>
          </div>

          <!-- 휴대폰 번호 -->
          <div class="field-group">
            <label class="field-label">휴대폰 번호 <span class="req">*</span></label>
            <div class="row">
              <div class="input-box"><input type="tel" placeholder="010"></div>
              <div class="input-box"><input type="tel" placeholder="1234"></div>
              <div class="input-box"><input type="tel" placeholder="5678"></div>
            </div>
          </div>

          <!-- 주소 -->
          <div class="field-group">
            <label class="field-label">주소</label>
            <div class="addr-stack">
              <div class="row">
                <div class="input-box"><input type="text" placeholder="00000"></div>
                <button class="addr-find">주소찾기</button>
              </div>
              <div class="input-box"><input type="text" placeholder="서울특별시 강남구 도산대로99길 27-2"></div>
              <div class="input-box"><input type="text" placeholder="301호"></div>
            </div>
          </div>

          <!-- 성별 -->
          <div class="field-group">
            <label class="field-label">성별</label>
            <div class="gender-row" id="gender">
              <label class="radio-opt on"><span class="dot"></span><span>선택하지 않음</span></label>
              <label class="radio-opt"><span class="dot"></span><span>남</span></label>
              <label class="radio-opt"><span class="dot"></span><span>여</span></label>
            </div>
          </div>

          <button class="submit-btn" id="submit-signup">가입하기</button>
        </div>
      </section>

      <div class="toast" id="toast"></div>
    </div>
  </div>

<script>
  const login = document.getElementById('screen-login');
  const signup = document.getElementById('screen-signup');
  const toast = document.getElementById('toast');
  let toastTimer;

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>toast.classList.remove('show'), 1600);
  }

  function goSignup(){
    signup.hidden = false;
    // force reflow so the transition runs
    signup.getBoundingClientRect();
    signup.classList.remove('is-in-right');
    login.classList.add('is-out');
  }
  function goLogin(){
    signup.classList.add('is-in-right');
    login.classList.remove('is-out');
    setTimeout(()=>{ signup.hidden = true; signup.querySelector('.signup-scroll').scrollTop = 0; }, 360);
  }

  document.getElementById('go-signup').addEventListener('click', goSignup);
  document.getElementById('signup-back').addEventListener('click', goLogin);
  document.getElementById('signup-home').addEventListener('click', goLogin);
  document.getElementById('login-close').addEventListener('click', ()=>showToast('로그인 화면을 닫습니다'));
  document.getElementById('login-submit').addEventListener('click', ()=>showToast('로그인을 시도합니다'));
  document.getElementById('submit-signup').addEventListener('click', ()=>showToast('가입이 완료되었습니다 🎉'));

  // password eye toggles
  document.querySelectorAll('[data-eye]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const input = btn.parentElement.querySelector('input');
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      btn.style.color = showing ? 'rgba(0,0,0,.55)' : '#5D00FF';
    });
  });

  // duplicate-check buttons
  document.querySelectorAll('.dup').forEach(b=>b.addEventListener('click',()=>showToast('사용 가능합니다')));
  document.querySelector('.addr-find').addEventListener('click',()=>showToast('주소 검색을 엽니다'));

  // gender radios
  document.getElementById('gender').addEventListener('click', e=>{
    const opt = e.target.closest('.radio-opt');
    if(!opt) return;
    document.querySelectorAll('#gender .radio-opt').forEach(o=>o.classList.remove('on'));
    opt.classList.add('on');
  });

  // selectbox demo fill
  document.querySelectorAll('.selectbox').forEach((sb,i)=>{
    sb.addEventListener('click', ()=>{
      const span = sb.querySelector('span');
      const vals = [['1990','1991','1992'],['01','02','03'],['01','15','28']][i] || ['—'];
      span.textContent = vals[Math.floor(Math.random()*vals.length)];
      sb.classList.add('filled');
    });
  });
</script>
</body>
</html>
